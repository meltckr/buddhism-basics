    const Term = ({ term, children }) => {
      const [isOpen, setIsOpen] = useState(false);
      const termRef = useRef(null);
      const definition = definitions[term.toLowerCase()];

      // Close when tapping outside or scrolling
      useEffect(() => {
        if (!isOpen) return;
        const close = () => setIsOpen(false);
        document.addEventListener('click', close);
        window.addEventListener('scroll', close, { passive: true });
        return () => {
          document.removeEventListener('click', close);
          window.removeEventListener('scroll', close);
        };
      }, [isOpen]);

      if (!definition) return <span>{children || term}</span>;

      return (
        <span
          ref={termRef}
          className="term"
          onClick={(e) => { e.stopPropagation(); setIsOpen(!isOpen); }}
          style={{ cursor: "pointer", borderBottom: "1px dotted #9E9E9E" }}
        >
          {children || term}
          {isOpen && ReactDOM.createPortal(
            <div className="popover-overlay" onClick={() => setIsOpen(false)}>
              <div className="popover" onClick={(e) => e.stopPropagation()}>
                <div className="popover-close" onClick={() => setIsOpen(false)}>✕</div>
                <div className="popover-term">{definition.term}</div>
                <div className="popover-pronunciation">{definition.pronunciation}</div>
                <div className="popover-etymology">{definition.etymology}</div>
                <div className="popover-definition">{definition.definition}</div>
              </div>
            </div>,
            document.body
          )}
        </span>
      );
    };

        <circle cx="60" cy="60" r="4" fill="#D4AF37" opacity="0.6"/>
        {[0,1,2,3,4,5,6,7].map(i => {
          const angle = (i * Math.PI) / 4;
          const x1 = 60 + 12 * Math.cos(angle);
          const y1 = 60 + 12 * Math.sin(angle);
          const x2 = 60 + 52 * Math.cos(angle);
          const y2 = 60 + 52 * Math.sin(angle);
          return <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#D4AF37" strokeWidth="2" opacity="0.7"/>;
        })}
        {[0,1,2,3,4,5,6,7].map(i => {
          const angle = (i * Math.PI) / 4;
          const cx = 60 + 52 * Math.cos(angle);
          const cy = 60 + 52 * Math.sin(angle);
          return <circle key={`dot-${i}`} cx={cx} cy={cy} r="4" fill="#D4AF37" opacity="0.8"/>;

                <Term term="Buddhism">Buddhism</Term> doesn't fit neatly into Western categories. It's not a religion in the sense of worshipping a god. There's no creator deity. No cosmic judge. No doctrine of original sin. And nobody expects you to take it on faith. Instead, the Buddha (who was a human, not a god) basically said: "Don't believe me. Test it yourself." Which is wild. And refreshing.

              <p>

              </p>

              </p>
              <p>
                "Right" here doesn't mean moralistic. It means aligned with wisdom and compassion. It means understanding what actually causes harm and what leads to peace.
              </p>
              <p>
                The most foundational practice is <Term term="mindfulness">mindfulness</Term>. Paying attention to what's happening, right now, without judgment. Sitting and watching your breath. Watching your thoughts arise and pass. Watching your emotions. This sounds simple, but it's the whole practice. When you really pay attention to your experience, things start to shift. You see patterns. You see your own reactivity. You see that thoughts aren't facts. You gain some space.
              </p>
              <p>
                Another core practice is <Term term="vipassana">Vipassanā</Term>, insight meditation. You're not just observing. You're noticing the constant change — sensations arising and passing, thoughts appearing and dissolving, emotions coming and going. Through this observation, understanding deepens naturally. You see <Term term="anicca">Anicca</Term>, impermanence, directly. Not as a concept, but as lived experience.
              </p>
              <p>
                And there's <Term term="metta">Mettā</Term>, loving-kindness meditation. You systematically cultivate goodwill toward yourself and all beings. It's not sentimental. It's a commitment: "May I be free from suffering. May you be free from suffering. May all beings be free from suffering." This trains the mind in compassion.

              </p>

              margin-bottom: 0.8rem;
              padding-bottom: 0.8rem;
              border-bottom: 1px solid rgba(212, 175, 55, 0.15);
            }

            .popover-definition {
              font-size: 0.95rem;
              color: #C0B8A8;
              line-height: 1.7;
            }

            /* === NAVIGATION === */
            .chapter-nav {
              display: flex;
              gap: 1rem;
              justify-content: space-between;
              margin-top: 2rem;
              padding-top: 2rem;
            }

            .nav-button {
              background: rgba(212, 175, 55, 0.04);
              color: #D4AF37;
              border: 1px solid rgba(212, 175, 55, 0.25);
              padding: 1rem 1.4rem;
              border-radius: 10px;
              cursor: pointer;
              font-family: 'Lora', serif;
              font-size: 0.9rem;
              transition: all 0.3s ease;
              display: flex;
              align-items: center;
              gap: 0.6rem;
              max-width: 48%;
              text-align: left;
            }

            .nav-button:hover {
              background: rgba(212, 175, 55, 0.08);
              border-color: rgba(212, 175, 55, 0.5);
              transform: translateY(-1px);
              box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            }

            .nav-arrow {
              font-size: 1.3rem;
              flex-shrink: 0;
            }

            .nav-label {
              font-size: 0.85rem;
              color: #8A8078;
              line-height: 1.3;
            }

            .nav-next {
              text-align: right;
              margin-left: auto;
              flex-direction: row;
            }

            /* === FOOTER === */
            .app-footer {
              text-align: center;
              padding: 3rem 0 2rem;
              opacity: 0.4;
            }

            .app-footer .dharma-wheel {
              margin-bottom: 0.6rem;
            }

            .app-footer p {
              font-family: 'IBM Plex Mono', monospace;
              font-size: 0.75rem;
              color: #8A8078;
              letter-spacing: 0.1em;
              text-transform: uppercase;
            }

            /* === MOBILE === */
            @media (max-width: 768px) {
              body { font-size: 16px; }

              .header { padding: 2.5rem 1.5rem 2rem; }

              .header h1 { font-size: 2.2rem; }

              .dharma-wheel { width: 56px; height: 56px; }

              .main-content { padding: 2rem 1.2rem; }

              .chapter-header-block h2 { font-size: 1.7rem; }

              .chapter-content p:first-of-type::first-letter {
                font-size: 3.2em;
              }

              .popover {
                border-radius: 14px 14px 0 0;
              }

              .chapter-nav { flex-direction: column; }

              .nav-button { max-width: 100%; width: 100%; }

              .nav-next { margin-left: 0; }
            }

            @media (max-width: 400px) {
              .header h1 { font-size: 1.8rem; }
              .chapter-header-block h2 { font-size: 1.5rem; }
            }
          `}</style>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(err => {
        console.log('SW registration failed: ', err);
      });
    }
  </script>
</body>
</html>
